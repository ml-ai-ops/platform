site_name: Nexus — ml-ai-ops-platform
site_description: >-
  Self-hosted MLOps, data-centric AI, and agentic AI platform — one Docker
  Compose stack from laptop to public VM. Full documentation: architecture,
  services, modules, installation, configuration, API, RBAC, and operations.
site_author: Nexus platform team
repo_name: ml-ai-ops/platform
repo_url: https://github.com/ml-ai-ops/platform
edit_uri: edit/main/docs/
docs_dir: docs
copyright: Nexus is a self-hosted platform. Local credentials in this documentation are development defaults — override every one for public deployments.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

nav:
  - Home: index.md
  - Overview:
      - What is Nexus: overview/what-is-nexus.md
      - Architecture: overview/architecture.md
      - Core concepts: overview/concepts.md
      - Technology & modules used: overview/technology.md
  - Getting started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - Configuration reference: getting-started/configuration.md
  - Services:
      - Overview: services/index.md
      - Gateway (control plane): services/gateway.md
      - Data & messaging: services/data-plane.md
      - Execution & serving: services/execution.md
      - AI & observability: services/ai-observability.md
  - Modules:
      - Go packages: modules/go-packages.md
      - Python SDK & workloads: modules/python.md
  - Guides:
      - Connecting all services: connecting-services.md
      - Jupyter workbench: guides/workbench.md
      - AI coding & IDE workspace: guides/coding-workspace.md
      - Engineering blog: guides/engineering-blog.md
      - Pipelines: guides/pipelines.md
      - Distributed workspaces, functions & Git: guides/distributed-workspaces.md
      - Models & serving: guides/models-serving.md
      - Agents: guides/agents.md
      - Feature store: guides/features.md
      - Real-time processing: guides/realtime.md
  - Reference:
      - REST API: reference/api.md
      - RBAC & security: reference/rbac.md
      - CLI: reference/cli.md
  - Operations:
      - Local operations: operations/local.md
      - Public hosting: hosting.md
      - Troubleshooting: operations/troubleshooting.md
