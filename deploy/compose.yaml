name: mlaiops

services:
  postgres:
    image: postgres:16.9-alpine
    environment:
      POSTGRES_USER: mlaiops
      POSTGRES_PASSWORD: mlaiops-local
      POSTGRES_DB: mlaiops
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: [CMD-SHELL, pg_isready -U mlaiops]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4.5-alpine
    command: [redis-server, --appendonly, "yes"]
    ports: ["${REDIS_PORT:-6379}:6379"]
    volumes: [redis-data:/data]
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.9.1
    ports: ["${KAFKA_PORT:-9092}:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: [CMD-SHELL, /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list]
      interval: 10s
      timeout: 5s
      retries: 20

  kafka-rest:
    image: confluentinc/cp-kafka-rest:7.8.0
    depends_on:
      kafka: {condition: service_healthy}
    environment:
      KAFKA_REST_HOST_NAME: kafka-rest
      KAFKA_REST_BOOTSTRAP_SERVERS: kafka:9092
    ports: ["${KAFKA_REST_PORT:-8082}:8082"]

  minio:
    image: quay.io/minio/minio:RELEASE.2025-05-24T17-08-30Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: mlaiops
      MINIO_ROOT_PASSWORD: mlaiops-local-secret
    ports: ["${MINIO_PORT:-9000}:9000", "${MINIO_CONSOLE_PORT:-9001}:9001"]
    volumes: [minio-data:/data]

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.1.1
    depends_on:
      postgres: {condition: service_healthy}
      minio: {condition: service_started}
    command:
      - mlflow
      - server
      - --host=0.0.0.0
      - --port=5000
      - --backend-store-uri=postgresql://mlaiops:mlaiops-local@postgres:5432/mlaiops
      - --default-artifact-root=s3://mlaiops-models
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: mlaiops
      AWS_SECRET_ACCESS_KEY: mlaiops-local-secret
    ports: ["${MLFLOW_PORT:-5000}:5000"]

  gateway:
    build:
      context: ..
      args: {SERVICE: gateway}
    depends_on:
      postgres: {condition: service_healthy}
      kafka-rest: {condition: service_started}
    environment:
      DATABASE_URL: postgres://mlaiops:mlaiops-local@postgres:5432/mlaiops?sslmode=disable
      KAFKA_REST_URL: http://kafka-rest:8082
      MLAIOPS_TENANT: local
    ports: ["${GATEWAY_PORT:-8080}:8080"]

volumes:
  postgres-data:
  redis-data:
  minio-data:
