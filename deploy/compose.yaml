name: mlaiops

services:
  postgres:
    # pgvector build of PostgreSQL 16: same database, plus the vector extension
    # used by agent long-term memory and RAG (PRD sections 4.3, 4.6).
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: mlaiops
      POSTGRES_PASSWORD: mlaiops-local
      POSTGRES_DB: mlaiops
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: [CMD-SHELL, pg_isready -U mlaiops]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4.5-alpine
    command: [redis-server, --appendonly, "yes"]
    ports: ["${REDIS_PORT:-6379}:6379"]
    volumes: [redis-data:/data]
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.9.1
    ports: ["${KAFKA_PORT:-9092}:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: [CMD-SHELL, /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list]
      interval: 10s
      timeout: 5s
      retries: 20

  kafka-rest:
    image: confluentinc/cp-kafka-rest:7.8.0
    depends_on:
      kafka: {condition: service_healthy}
    environment:
      KAFKA_REST_HOST_NAME: kafka-rest
      KAFKA_REST_BOOTSTRAP_SERVERS: kafka:9092
    ports: ["${KAFKA_REST_PORT:-8082}:8082"]

  minio:
    image: quay.io/minio/minio:RELEASE.2025-05-24T17-08-30Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: mlaiops
      MINIO_ROOT_PASSWORD: mlaiops-local-secret
    ports: ["${MINIO_PORT:-9000}:9000", "${MINIO_CONSOLE_PORT:-9001}:9001"]
    volumes: [minio-data:/data]

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-05-21T01-59-54Z
    depends_on:
      minio: {condition: service_started}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 mlaiops mlaiops-local-secret; do sleep 2; done;
      mc mb --ignore-existing local/mlaiops-models;
      mc mb --ignore-existing local/mlaiops-artifacts;
      mc mb --ignore-existing local/mlaiops-features;
      mc mb --ignore-existing local/mlaiops-traces;
      exit 0;"

  mlflow:
    build:
      context: mlflow
    depends_on:
      postgres: {condition: service_healthy}
      minio-init: {condition: service_completed_successfully}
    command:
      - mlflow
      - server
      - --host=0.0.0.0
      - --port=5000
      - --backend-store-uri=postgresql://mlaiops:mlaiops-local@postgres:5432/mlaiops
      - --default-artifact-root=s3://mlaiops-models
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: mlaiops
      AWS_SECRET_ACCESS_KEY: mlaiops-local-secret
    ports: ["${MLFLOW_PORT:-15000}:5000"]
    healthcheck:
      test: [CMD, python, -c, "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 20

  gateway:
    build:
      context: ..
      args: {SERVICE: gateway}
    depends_on:
      postgres: {condition: service_healthy}
      kafka-rest: {condition: service_started}
    environment:
      DATABASE_URL: postgres://mlaiops:mlaiops-local@postgres:5432/mlaiops?sslmode=disable
      KAFKA_REST_URL: http://kafka-rest:8082
      MLAIOPS_TENANT: local
      AGENT_RUNTIME_URL: http://agent-runtime:9000
    ports: ["${GATEWAY_PORT:-8080}:8080"]

  trace-proxy:
    build:
      context: ..
      args: {SERVICE: trace-proxy}
    depends_on:
      kafka-rest: {condition: service_started}
    environment:
      # All agent LLM calls egress here; requests forward to the configured
      # provider and every call is published to mlaiops.llm.traces.
      LLM_UPSTREAM_URL: ${LLM_UPSTREAM_URL:-https://api.openai.com}
      TRACE_SINK_FORMAT: kafka-rest
      TRACE_SINK_URL: http://kafka-rest:8082/topics/mlaiops.llm.traces
      MLAIOPS_AGENT_NAME: shared
      MLAIOPS_AGENT_VERSION: local
    ports: ["${TRACE_PROXY_PORT:-8081}:8081"]

  agent-runtime:
    build:
      context: ..
      dockerfile: python/agent_runtime/Dockerfile
    depends_on:
      postgres: {condition: service_healthy}
      trace-proxy: {condition: service_started}
    environment:
      MLAIOPS_GRAPH_MODULE: ${MLAIOPS_GRAPH_MODULE:-agents.customer_support.graph:build}
      MLAIOPS_AGENT_NAME: customer-support
      MLAIOPS_AGENT_ID: ${MLAIOPS_AGENT_ID:-}
      MLAIOPS_URL: http://gateway:8080
      DATABASE_URL: postgres://mlaiops:mlaiops-local@postgres:5432/mlaiops?sslmode=disable
      # mock by default: the stack works with zero API keys. Set
      # MLAIOPS_LLM_BACKEND=openai (plus OPENAI_API_KEY) or anthropic for real
      # models; calls egress through the trace-proxy.
      MLAIOPS_LLM_BACKEND: ${MLAIOPS_LLM_BACKEND:-mock}
      MLAIOPS_LLM_MODEL: ${MLAIOPS_LLM_MODEL:-}
      MLAIOPS_LLM_BASE_URL: ${MLAIOPS_LLM_BASE_URL:-http://trace-proxy:8081/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
    ports: ["${AGENT_RUNTIME_PORT:-9000}:9000"]

volumes:
  postgres-data:
  redis-data:
  minio-data:
