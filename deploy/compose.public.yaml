# Public hosting overlay: the local stack plus an authenticated TLS edge.
# Usage:
#   docker compose -f deploy/compose.yaml -f deploy/compose.public.yaml up -d
# Requirements: a DNS record pointing at this VM and a filled-in .env
# (see .env.example). No service is swapped — local == deployed.

name: mlaiops

services:
  caddy:
    image: caddy:2.8
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    environment:
      MLAIOPS_DOMAIN: ${MLAIOPS_DOMAIN:?set MLAIOPS_DOMAIN in .env}
      MLAIOPS_ACME_EMAIL: ${MLAIOPS_ACME_EMAIL:?set MLAIOPS_ACME_EMAIL in .env}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      gateway: {condition: service_started}

  dex:
    image: dexidp/dex:v2.41.1
    restart: unless-stopped
    command: [dex, serve, /etc/dex/config.yaml]
    environment:
      MLAIOPS_DOMAIN: ${MLAIOPS_DOMAIN}
      DEX_CLIENT_SECRET: ${DEX_CLIENT_SECRET:?set DEX_CLIENT_SECRET in .env}
      DEX_ADMIN_EMAIL: ${DEX_ADMIN_EMAIL:?set DEX_ADMIN_EMAIL in .env}
      # bcrypt hash of the admin password; generate with:
      #   docker run --rm httpd:2.4-alpine htpasswd -bnBC 10 "" 'your-password' | tr -d ':\n'
      DEX_ADMIN_PASSWORD_HASH: ${DEX_ADMIN_PASSWORD_HASH:?set DEX_ADMIN_PASSWORD_HASH in .env}
    volumes:
      - ./dex/config.yaml:/etc/dex/config.yaml:ro

  gateway:
    restart: unless-stopped
    environment:
      # Auth is ON in public mode: the gateway verifies Dex-issued JWTs.
      OIDC_ISSUER: https://${MLAIOPS_DOMAIN}/dex
      OIDC_JWKS_URL: http://dex:5556/dex/keys
      OIDC_AUDIENCE: mlaiops-console
      MLAIOPS_ALLOWED_ORIGIN: https://${MLAIOPS_DOMAIN}
      MLAIOPS_INTERNAL_TOKEN: ${MLAIOPS_INTERNAL_TOKEN:?set MLAIOPS_INTERNAL_TOKEN in .env}
    ports: []  # only reachable through Caddy

  # Internal services keep running exactly as locally, restarted on failure.
  postgres: {restart: unless-stopped}
  redis: {restart: unless-stopped}
  kafka: {restart: unless-stopped}
  kafka-rest: {restart: unless-stopped, ports: []}
  minio: {restart: unless-stopped, ports: []}
  mlflow: {restart: unless-stopped, ports: []}
  langfuse:
    restart: unless-stopped
    ports: []
    environment:
      NEXTAUTH_URL: https://${MLAIOPS_DOMAIN}/langfuse
  trace-proxy: {restart: unless-stopped, ports: []}
  agent-runtime:
    restart: unless-stopped
    ports: []
    environment:
      MLAIOPS_TOKEN: ${MLAIOPS_INTERNAL_TOKEN}
  feature-gateway:
    restart: unless-stopped
    ports: []
    environment:
      MLAIOPS_INTERNAL_TOKEN: ${MLAIOPS_INTERNAL_TOKEN}
  storage-proxy:
    restart: unless-stopped
    ports: []
    environment:
      MLAIOPS_INTERNAL_TOKEN: ${MLAIOPS_INTERNAL_TOKEN}
  serving-manager:
    restart: unless-stopped
    ports: []
    environment:
      MLAIOPS_INTERNAL_TOKEN: ${MLAIOPS_INTERNAL_TOKEN}
  prefect-server: {restart: unless-stopped, ports: []}
  # The workbench stays private on the VM; reach it over an SSH tunnel:
  #   ssh -L 8888:localhost:8888 <vm>  (after re-publishing the port locally)
  jupyter: {restart: unless-stopped, ports: []}
  pipeline-runner:
    environment:
      MLAIOPS_TOKEN: ${MLAIOPS_INTERNAL_TOKEN}
  realtime-processor:
    environment:
      MLAIOPS_TOKEN: ${MLAIOPS_INTERNAL_TOKEN}

volumes:
  caddy-data:
  caddy-config:
