apiVersion: v1
kind: Namespace
metadata:
  name: mlaiops-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlaiops-gateway
  namespace: mlaiops-system
spec:
  replicas: 2
  selector:
    matchLabels: {app: mlaiops-gateway}
  template:
    metadata:
      labels: {app: mlaiops-gateway}
    spec:
      containers:
        - name: gateway
          image: ghcr.io/mlaiops/gateway:latest
          envFrom:
            - secretRef: {name: mlaiops-openfaas, optional: true}
          env:
            - {name: PORT, value: "8080"}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: {name: mlaiops-postgres, key: database-url}
            - {name: MLAIOPS_TENANT, value: default}
            - {name: KAFKA_REST_URL, value: "http://kafka-rest.mlaiops-system:8082"}
            - {name: OIDC_ISSUER, value: "https://dex.example.com"}
            - {name: OIDC_AUDIENCE, value: mlaiops}
            - {name: OIDC_JWKS_URL, value: "https://dex.example.com/keys"}
          ports: [{name: http, containerPort: 8080}]
          readinessProbe: {httpGet: {path: /api/v1/health, port: http}}
          livenessProbe: {httpGet: {path: /api/v1/health, port: http}}
          securityContext: {allowPrivilegeEscalation: false, runAsNonRoot: true}
---
apiVersion: v1
kind: Service
metadata:
  name: mlaiops-gateway
  namespace: mlaiops-system
spec:
  selector: {app: mlaiops-gateway}
  ports: [{name: http, port: 8080, targetPort: http}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlaiops-feature-gateway
  namespace: mlaiops-system
spec:
  replicas: 2
  selector:
    matchLabels: {app: mlaiops-feature-gateway}
  template:
    metadata: {labels: {app: mlaiops-feature-gateway}}
    spec:
      containers:
        - name: feature-gateway
          image: ghcr.io/mlaiops/feature-gateway:latest
          ports: [{name: http, containerPort: 8083}]
          readinessProbe: {httpGet: {path: /healthz, port: http}}
          livenessProbe: {httpGet: {path: /healthz, port: http}}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, runAsNonRoot: true}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlaiops-storage-proxy
  namespace: mlaiops-system
spec:
  replicas: 2
  selector:
    matchLabels: {app: mlaiops-storage-proxy}
  template:
    metadata: {labels: {app: mlaiops-storage-proxy}}
    spec:
      containers:
        - name: storage-proxy
          image: ghcr.io/mlaiops/storage-proxy:latest
          envFrom: [{secretRef: {name: mlaiops-storage-credentials}}]
          ports: [{name: http, containerPort: 8084}]
          readinessProbe: {httpGet: {path: /healthz, port: http}}
          livenessProbe: {httpGet: {path: /healthz, port: http}}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, runAsNonRoot: true}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlaiops-metrics-collector
  namespace: mlaiops-system
spec:
  replicas: 1
  selector:
    matchLabels: {app: mlaiops-metrics-collector}
  template:
    metadata: {labels: {app: mlaiops-metrics-collector}}
    spec:
      containers:
        - name: collector
          image: ghcr.io/mlaiops/metrics-collector:latest
          ports: [{name: metrics, containerPort: 9090}]
          readinessProbe: {httpGet: {path: /healthz, port: metrics}}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, runAsNonRoot: true}
