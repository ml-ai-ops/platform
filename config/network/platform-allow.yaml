apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-required-egress
  namespace: mlaiops-system
spec:
  podSelector:
    matchLabels: {app: mlaiops-gateway}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - {protocol: TCP, port: 5432}
        - {protocol: TCP, port: 8082}
        - {protocol: TCP, port: 443}
    - to: []
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-gateway
  namespace: mlaiops-system
spec:
  podSelector:
    matchLabels: {app: mlaiops-gateway}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - {protocol: TCP, port: 8080}
