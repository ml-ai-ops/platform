apiVersion: v1
kind: ServiceAccount
metadata:
  name: mlaiops-operator
  namespace: mlaiops-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mlaiops-operator
rules:
  - apiGroups: [mlaiops.io]
    resources: [nexusagents, nexusagents/status, nexuspipelineruns, nexuspipelineruns/status, nexustools, nexustools/status, nexusconnections, nexusconnections/status, nexusmodelpromotions, nexusmodelpromotions/status]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [services, secrets, configmaps, events]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [networking.istio.io]
    resources: [virtualservices, destinationrules]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mlaiops-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mlaiops-operator
subjects:
  - kind: ServiceAccount
    name: mlaiops-operator
    namespace: mlaiops-system
