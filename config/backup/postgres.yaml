apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mlaiops-postgres
  namespace: mlaiops-system
spec:
  instances: 3
  storage:
    size: 20Gi
  backup:
    barmanObjectStore:
      destinationPath: s3://mlaiops-backups/postgres
      endpointURL: https://s3.example.com
      s3Credentials:
        accessKeyId: {name: backup-storage, key: ACCESS_KEY_ID}
        secretAccessKey: {name: backup-storage, key: SECRET_ACCESS_KEY}
    retentionPolicy: 30d
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: mlaiops-postgres-daily
  namespace: mlaiops-system
spec:
  schedule: "0 0 2 * * *"
  backupOwnerReference: self
  cluster:
    name: mlaiops-postgres
