apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nexusagents.mlaiops.io
spec:
  group: mlaiops.io
  scope: Namespaced
  names:
    plural: nexusagents
    singular: nexusagent
    kind: NexusAgent
    shortNames: [nagent]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Status
          type: string
          jsonPath: .status.phase
        - name: Ready
          type: integer
          jsonPath: .status.readyReplicas
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [image, graphModule, version]
              properties:
                version: {type: string, minLength: 1}
                image: {type: string, minLength: 1}
                graphModule: {type: string, minLength: 1}
                replicas:
                  type: object
                  properties:
                    min: {type: integer, minimum: 1, default: 1}
                    max: {type: integer, minimum: 1, default: 10}
                llm:
                  type: object
                  properties:
                    backend: {type: string}
                    inferenceServiceRef: {type: string}
                tools:
                  type: array
                  items:
                    type: object
                    required: [name, version]
                    properties:
                      name: {type: string}
                      version: {type: string}
                langfuseProject: {type: string}
                trafficPolicy:
                  type: object
                  properties:
                    canaryWeight: {type: integer, minimum: 0, maximum: 100}
                    stableRef: {type: string}
            status:
              type: object
              properties:
                phase: {type: string}
                readyReplicas: {type: integer}
                observedGeneration: {type: integer, format: int64}
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type: {type: string}
                      status: {type: string}
                      reason: {type: string}
                      message: {type: string}
                      lastTransitionTime: {type: string, format: date-time}
