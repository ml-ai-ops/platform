apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nexusworkspaces.mlaiops.io
spec:
  group: mlaiops.io
  scope: Namespaced
  names:
    plural: nexusworkspaces
    singular: nexusworkspace
    kind: NexusWorkspace
    shortNames: [nws]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources: {status: {}}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [subject, compute, storageGB]
              properties:
                subject: {type: string, minLength: 1}
                services:
                  type: array
                  uniqueItems: true
                  items: {type: string}
                disabled: {type: boolean, default: false}
                storageGB: {type: integer, format: int32, minimum: 1}
                compute:
                  type: object
                  required: [vcpus, memoryGB]
                  properties:
                    vcpus: {type: integer, format: int32, minimum: 1}
                    memoryGB: {type: integer, format: int32, minimum: 1}
                    gpus: {type: integer, format: int32, minimum: 0, default: 0}
                    gpuType: {type: string}
                    maxVMs: {type: integer, format: int32, minimum: 0, default: 0}
            status:
              type: object
              properties:
                phase: {type: string}
                readyReplicas: {type: integer, format: int32}
                workbenchURL: {type: string}
                ideURL: {type: string}
                observedGeneration: {type: integer, format: int64}
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: [type]
                  items:
                    type: object
                    required: [lastTransitionTime, message, reason, status, type]
                    properties:
                      lastTransitionTime: {type: string, format: date-time}
                      message: {type: string}
                      observedGeneration: {type: integer, format: int64}
                      reason: {type: string}
                      status: {type: string, enum: ["True", "False", Unknown]}
                      type: {type: string}
