apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nexusmodelpromotions.mlaiops.io
spec:
  group: mlaiops.io
  scope: Namespaced
  names: {plural: nexusmodelpromotions, singular: nexusmodelpromotion, kind: NexusModelPromotion, shortNames: [nmp]}
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources: {status: {}}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [modelName, version, targetStage]
              properties:
                modelName: {type: string}
                version: {type: string}
                targetStage: {type: string, enum: [staging, production, archived]}
                gates:
                  type: array
                  items:
                    type: object
                    required: [metric, operator, value]
                    properties:
                      metric: {type: string}
                      operator: {type: string, enum: [gte, lte]}
                      value: {type: number}
            status:
              type: object
              properties:
                phase: {type: string}
                message: {type: string}
