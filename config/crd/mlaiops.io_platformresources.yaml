apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: nexuspipelineruns.mlaiops.io
spec:
  group: mlaiops.io
  scope: Namespaced
  names: {plural: nexuspipelineruns, singular: nexuspipelinerun, kind: NexusPipelineRun, shortNames: [npr]}
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources: {status: {}}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [pipelineRef]
              properties:
                pipelineRef: {type: string}
                parameters: {type: object, x-kubernetes-preserve-unknown-fields: true}
                serviceAccountName: {type: string}
            status:
              type: object
              properties:
                phase: {type: string}
                workflowRef: {type: string}
                startedAt: {type: string, format: date-time}
                finishedAt: {type: string, format: date-time}
                message: {type: string}
---
