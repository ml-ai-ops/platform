name: Platform CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.9-alpine
        env:
          POSTGRES_USER: mlaiops
          POSTGRES_PASSWORD: mlaiops-ci
          POSTGRES_DB: mlaiops
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U mlaiops"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: go/go.mod
      - run: gofmt -l . | tee /tmp/unformatted && test ! -s /tmp/unformatted
      - run: go vet ./...
      - run: go test -race ./...
      - run: go test -tags=integration ./integration
        env:
          TEST_DATABASE_URL: postgres://mlaiops:mlaiops-ci@localhost:5432/mlaiops?sslmode=disable
      - run: go build ./cmd/...
      - name: Enforce architecture exclusions
        run: |
          ! grep -RniE '\b(mlrun|nuclio|v3io|iguazio)\b' . ../config

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: make install
      - run: ruff check python
      - run: python -m pytest -q
      - run: python -m compileall -q python/mlaiops_sdk
