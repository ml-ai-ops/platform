name: Platform CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go/go.mod
      - run: gofmt -l . | tee /tmp/unformatted && test ! -s /tmp/unformatted
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build ./cmd/gateway

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: make install
      - run: ruff check python
      - run: python -m pytest -q
