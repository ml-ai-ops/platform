<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nexus API Reference</title>
  <link rel="stylesheet" href="/api-docs.css">
</head>
<body>
  <header>
    <a href="/" class="brand"><span>N</span><b>Nexus</b></a>
    <nav><a href="/">Workspace</a><a href="/api/openapi.json">OpenAPI JSON</a></nav>
  </header>
  <main>
    <section class="intro">
      <p class="eyebrow">DEVELOPER REFERENCE</p>
      <h1>Nexus REST API</h1>
      <p>Explore the control-plane contract used by the console, SDK, CLI, and platform services.</p>
      <div class="meta"><span id="api-version">Loading…</span><span>OpenAPI 3</span><span id="operation-count"></span></div>
    </section>
    <section class="toolbar">
      <label for="search">Search endpoints</label>
      <input id="search" type="search" placeholder="Try pipelines, agents, POST…" autocomplete="off">
    </section>
    <div id="api-error" role="alert"></div>
    <section id="operations" aria-live="polite"></section>
  </main>
  <template id="operation-template">
    <details class="operation">
      <summary><span class="method"></span><code class="path"></code><span class="summary"></span><span class="chevron">⌄</span></summary>
      <div class="operation-body">
        <p class="description"></p>
        <div class="request-line"><code class="request-url"></code><button class="copy">Copy cURL</button></div>
      </div>
    </details>
  </template>
  <script src="/api-docs.js"></script>
</body>
</html>
